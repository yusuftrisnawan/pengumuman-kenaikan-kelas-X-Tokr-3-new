<!DOCTYPE html>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* Mengatur agar dropdown berada di atas card jika diperlukan */
            padding: 20px;
            color: #2d3436;
        }

        /* Desain untuk Dropdown Pilihan Siswa */
        .pilih-box {
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            text-align: left;
        }

        .pilih-box label {
            color: white;
            font-weight: bold;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        .select-siswa {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: bold;
            color: #2d3436;
            background-color: #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 400px; /* Pas untuk ukuran layar HP */
            animation: popup 0.6s ease-out;
        }

        @keyframes popup {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        h1 {
            font-size: 24px;
            color: #2ed573;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nama-siswa {
            font-size: 22px;
            font-weight: bold;
            color: #2d3436;
            margin: 15px 0;
            border-bottom: 2px dashed #dfe6e9;
            padding-bottom: 15px;
        }

        .status {
            font-size: 18px;
            line-height: 1.4;
            color: #636e72;
        }

        .kelas {
            display: inline-block;
            background-color: #0984e3;
            color: white; /* Diubah ke white agar teks lebih kontras dan mudah dibaca */
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #808080;
        }
    </style>
</head>
